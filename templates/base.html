<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block meta_description %}NovaPlusBank - Swift, secure, and personal banking built around you.{% endblock %}" />
  <title>{% block title %}NovaPlusBank{% endblock %}</title>

  {% load static %}

  <!-- Tailwind CSS (compiled via CLI) -->
  <link rel="stylesheet" href="{% static 'css/output.css' %}" />

  <!-- Google Fonts: Inter + DM Serif Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  {% block extra_head %}{% endblock %}
</head>

<body class="font-sans bg-white text-gray-900 antialiased">

  {% include "partials/navbar.html" %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Main JS -->
  <script src="{% static 'js/main.js' %}"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
